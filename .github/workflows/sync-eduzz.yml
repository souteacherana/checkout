name: Sync Eduzz (hora em hora)

on:
  schedule:
    # A cada hora, no minuto 15 (evita a fila do minuto 0, que atrasa no GitHub)
    - cron: "15 * * * *"
  # Permite disparar manualmente pela aba Actions
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de sync
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 120 --retry 2 --retry-delay 10 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://checkout.riseeducacao.com.br/api/cron/sync-eduzz")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "Status: $STATUS"
          echo "Resposta: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Sync da Eduzz falhou com status $STATUS"
            exit 1
          fi
